[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--omit=dev --omit=optional --ignore-scripts"
  NPM_CONFIG_AUDIT = "false"
  NPM_CONFIG_FUND = "false"
  NPM_CONFIG_OPTIONAL = "false"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
